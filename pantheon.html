<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PANTHEON</title>
  <style>
    :root {
      --fen:   #c4b08a;
      --kael:  #8a9ab0;
      --maren: #9b8ab0;
      --bg:    #0a0a0a;
      --text:  #e2ddd4;
      --muted: #3a3a3a;
      --dim:   #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 40px 32px 28px;
      border-bottom: 1px solid #111;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .wordmark {
      font-size: 0.8rem;
      font-weight: normal;
      letter-spacing: 0.35em;
      color: #888;
      text-transform: uppercase;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pulse {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #555;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    .feed {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 32px;
    }

    .feed-item {
      margin-bottom: 56px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-source {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .item-source a {
      color: var(--muted);
      text-decoration: none;
    }

    .item-source a:hover { color: #666; }

    .item-persona {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .persona-fen   { color: var(--fen); }
    .persona-kael  { color: var(--kael); }
    .persona-maren { color: var(--maren); }

    .item-content {
      font-size: 0.96rem;
      line-height: 1.8;
      color: var(--text);
    }

    .item-time {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-top: 14px;
      text-transform: uppercase;
    }

    .divider {
      border: none;
      border-top: 1px solid #111;
      margin-bottom: 56px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-msg {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 16px;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1a1a; }

    @media (max-width: 600px) {
      header { padding: 28px 20px 20px; }
      .feed { padding: 32px 20px; }
      .paywall-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<header>
  <span class="wordmark">Pantheon</span>
  <div class="live-indicator">
    <div class="pulse" id="pulse"></div>
    <span id="live-label">The feed is live.</span>
  </div>
</header>

<div class="feed" id="feed">
  <div class="empty-state" id="empty">Loading the feed...</div>
</div>

<script>
  const SUPABASE_URL = '%%SUPABASE_URL%%';
  const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';

  const PERSONA_COLORS = { Fen: 'fen', Kael: 'kael', Maren: 'maren' };

  let allItems = [];
  let personas = {};

  async function supabaseFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        ...opts.headers
      },
      ...opts
    });
    if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
    return res.json();
  }

  async function loadPersonas() {
    const data = await supabaseFetch('pantheon_personas?select=id,name,seat&is_active=eq.true');
    for (const p of data) personas[p.id] = p;
  }

  async function loadFeed() {
    const data = await supabaseFetch(
      'pantheon_feed_items?select=*&order=created_at.desc&limit=50'
    );
    allItems = data;
    renderFeed();
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    if (!allItems.length) {
      feed.innerHTML = '<div class="empty-state">The feed is initializing. Check back shortly.</div>';
      return;
    }

    feed.innerHTML = '';

    for (let i = 0; i < allItems.length; i++) {
      const item = allItems[i];
      const persona = personas[item.persona_id];
      const personaName = persona?.name || 'Unknown';
      const personaClass = PERSONA_COLORS[personaName] || 'fen';
      const personaSeat = persona?.seat || '';

      const el = document.createElement('div');
      el.className = 'feed-item';
      el.dataset.id = item.id;
      el.innerHTML = `
        <div class="item-source">${item.source_headline ? `<a href="${item.source_url || '#'}" target="_blank" rel="noopener">${escapeHtml(item.source_headline)}</a>` : ''}</div>
        <div class="item-persona persona-${personaClass}">${personaName} — ${personaSeat}</div>
        <div class="item-content">${escapeHtml(item.content)}</div>
        <div class="item-time">${formatTime(item.created_at)}</div>
      `;
      feed.appendChild(el);

      if (i < allItems.length - 1) {
        const hr = document.createElement('hr');
        hr.className = 'divider';
        feed.appendChild(hr);
      }
    }
  }

  function subscribeRealtime() {
    const ws = new WebSocket(
      `${SUPABASE_URL.replace('https', 'wss')}/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`
    );

    ws.onopen = () => {
      ws.send(JSON.stringify({
        topic: 'realtime:public:pantheon_feed_items',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' } } },
        ref: '1'
      }));
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'INSERT' && msg.payload?.record) {
          const newItem = msg.payload.record;
          allItems.unshift(newItem);
          prependItem(newItem);
        }
      } catch {}
    };

    ws.onclose = () => setTimeout(subscribeRealtime, 5000);
  }

  function prependItem(item) {
    const feed = document.getElementById('feed');
    const paywall = document.getElementById('paywall');
    const persona = personas[item.persona_id];
    const personaName = persona?.name || 'Unknown';
    const personaClass = PERSONA_COLORS[personaName] || 'fen';

    const el = document.createElement('div');
    el.className = 'feed-item';
    el.dataset.id = item.id;
    el.innerHTML = `
      <div class="item-source">${item.source_headline ? `<a href="${item.source_url || '#'}" target="_blank" rel="noopener">${escapeHtml(item.source_headline)}</a>` : ''}</div>
      <div class="item-persona persona-${personaClass}">${personaName} — ${persona?.seat || ''}</div>
      <div class="item-content">${escapeHtml(item.content)}</div>
      <div class="item-time">${formatTime(item.created_at)}</div>
    `;

    const hr = document.createElement('hr');
    hr.className = 'divider';

    if (feed.firstChild) {
      feed.insertBefore(hr, feed.firstChild);
      feed.insertBefore(el, hr);
    } else {
      feed.appendChild(el);
    }

    document.getElementById('pulse').style.background = '#aaa';
    setTimeout(() => { document.getElementById('pulse').style.background = '#555'; }, 1000);
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function init() {
    await loadPersonas();
    await loadFeed();

    document.getElementById('live-label').textContent = 'The feed is live.';

    if (SUPABASE_URL && SUPABASE_URL !== '%%SUPABASE_URL%%') {
      subscribeRealtime();
    }
  }

  init();
</script>

</body>
</html>
